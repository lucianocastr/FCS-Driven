<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
	"http://www.w3.org/TR/html4/loose.dtd">
<html>
<!--<![-->
	<head>
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" >
		<meta http-equiv="content-type" content="text/html; charset=ISO-8859-1" >
		<meta http-equiv="cache-control" content="no-transform">
		<link href="/base.css" rel="stylesheet" type="text/css">
		<script language="JavaScript" type="text/javascript" src="/base.js"></script>
		<script language="JavaScript" type="text/javascript">
		function setWidth(){
			var el = document.getElementById("maintab");
			var sz = getFrameSizeById("head");
			if (sz.width > 50)
				el.style.minWidth = (sz.width -50)+"px";
		}
		window.onresize = setWidth;
		function showClock() {
			var d = new Date();
			var h = d.getHours();
			var m = d.getMinutes();
			if (m < 10) m = '0'+m;
			var s = d.getSeconds();
			if (s < 10) s = '0'+s;
			document.getElementById("local_time").innerHTML = h+':'+m+':'+s;
			setTimeout(function() {showClock();}, 500);
		}
		</script>
	</head>
	<body style="background: #f0ddc0;" onload="setWidth(); showClock();">
		<div>
			<table style="cellpadding=0; cellspacing=0; border=0; min-width:850px;" id="maintab">
				<tr>
					<td><img src="/blank.gif" width=40 height=1></td>
					<td><a href="http://fiplex.com" target="_blank" id="distrib_head"><img border=0 src="/logo.png"></a></td>
					<td><img src="/blank.gif" width=40 height=1></td>
					<td class="head" id="deviceName" name="deviceName">DIGITAL&nbsp;SCA</td>
					<td><img src="/blank.gif" width=40 height=1></td>
					<td><img src="/blank.gif" width=40 height=1></td>
					<td><div id="local_time"></div></td>
				</tr>
			</table>
		</div>
	</body>
</html>
